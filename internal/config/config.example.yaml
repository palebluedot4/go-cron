server:
  port: 8080
  env: development
  shutdown_timeout: 60s
  read_timeout: 15s
  write_timeout: 30s
  idle_timeout: 120s
  log_level: info
  log_output:
    console: true
    file: false

storage:
  postgres:
    enabled: true
    host: localhost
    port: 5432
    user: postgres
    password: ""
    dbname: postgres
    sslmode: disable
    max_open_conns: 10
    max_idle_conns: 2
    conn_max_lifetime: 5m

  mongodb:
    enabled: false
    uri: "mongodb://localhost:27017"
    database: mongodb
    max_pool_size: 20
    timeout: 10s

  redis:
    enabled: false
    host: localhost
    port: 6379
    password: ""
    db: 0
    max_retries: 3
    pool_size: 5
    min_idle_conns: 1
